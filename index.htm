<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইনান পাইকারি শপ - প্রবেশ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap');
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: screen;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #eee;
        }
        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-[450px] p-8 sm:p-10">
        <div class="text-center mb-10">
            <div class="inline-block p-4 bg-blue-50 rounded-full mb-4">
                <i class="fas fa-store text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">ইনান পাইকারি শপ</h1>
            <p id="statusText" class="text-gray-500">আপনার ব্যবসায়িক যাত্রা শুরু হোক এখান থেকেই</p>
        </div>

        <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-100 py-3 rounded-2xl hover:bg-gray-50 hover:border-blue-200 transition-all font-bold text-gray-700 mb-8 shadow-sm">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-6">
            গুগল দিয়ে প্রবেশ
        </button>

        <div class="relative mb-8 text-center">
            <hr class="border-gray-100">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-gray-400 text-xs font-bold uppercase tracking-widest">অথবা</span>
        </div>

        <form id="authForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2 ml-1">ইমেইল ঠিকানা</label>
                <input type="email" id="userEmail" required class="input-field w-full px-5 py-4 rounded-2xl outline-none" placeholder="example@mail.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2 ml-1">পাসওয়ার্ড</label>
                <input type="password" id="userPass" required class="input-field w-full px-5 py-4 rounded-2xl outline-none" placeholder="••••••••">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 flex items-center justify-center gap-2">
                <span>লগইন করুন</span>
            </button>
        </form>

        <div class="text-center mt-8">
            <p class="text-gray-500 text-sm">
                <span id="switchText">অ্যাকাউন্ট নেই?</span> 
                <button onclick="toggleAuthMode()" id="switchBtn" class="text-blue-600 font-bold hover:underline ml-1">নতুন খুলুন</button>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdbKGR6GALRaTmJFPgwfZAe_JiIcPnZ5U",
            authDomain: "enanprojct.firebaseapp.com",
            projectId: "enanprojct",
            storageBucket: "enanprojct.firebasestorage.app",
            messagingSenderId: "892424923254",
            appId: "1:892424923254:web:4b40a860059603ff8b1757"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let isLoginMode = true;

        // মোড সুইচিং
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('submitBtn').querySelector('span').innerText = isLoginMode ? 'লগইন করুন' : 'অ্যাকাউন্ট তৈরি করুন';
            document.getElementById('switchBtn').innerText = isLoginMode ? 'নতুন খুলুন' : 'লগইন করুন';
            document.getElementById('statusText').innerText = isLoginMode ? 'আপনার ব্যবসায়িক যাত্রা শুরু হোক এখান থেকেই' : 'ইনান শপে নতুন মেম্বার হিসেবে যুক্ত হোন';
            document.getElementById('switchText').innerText = isLoginMode ? 'অ্যাকাউন্ট নেই?' : 'অ্যাকাউন্ট আছে?';
        };

        // ফর্ম হ্যান্ডলার
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.classList.add('opacity-70');
            btn.querySelector('span').innerText = 'অপেক্ষা করুন...';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("অ্যাকাউন্ট তৈরি সফল!");
                }
            } catch (error) {
                alert("এরর: " + error.message);
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                btn.querySelector('span').innerText = isLoginMode ? 'লগইন করুন' : 'অ্যাকাউন্ট তৈরি করুন';
            }
        };

        // গুগল লগইন
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                alert("গুগল লগইন ব্যর্থ হয়েছে!");
            }
        };

        // লগইন চেক ও রিডাইরেক্ট
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "home.html";
        });
    </script>
</body>
</html>
