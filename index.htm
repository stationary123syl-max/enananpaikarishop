<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ইনান পাইকারি শপ - প্রবেশ করুন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .btn-active:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen antialiased">

    <div id="authContainer" class="flex items-center justify-center min-h-screen p-4 sm:p-8">
        <div class="glass-card w-full max-w-[400px] p-6 sm:p-10 border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-600 mb-2">ইনান পাইকারি শপ</h1>
                <p class="text-gray-400 text-sm tracking-wide">নিরাপদ পাইকারি কেনাবেচা</p>
            </div>

            <button id="googleBtn" class="btn-active w-full flex items-center justify-center gap-3 bg-white border border-gray-200 py-3 rounded-xl hover:bg-gray-50 transition-all font-semibold text-gray-700 shadow-sm mb-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5" alt="Google">
                গুগল দিয়ে প্রবেশ
            </button>

            <div class="relative mb-6 text-center">
                <hr class="border-gray-100">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-gray-400 text-[10px] uppercase tracking-[2px]">অথবা</span>
            </div>

            <form id="authForm" class="space-y-4">
                <input type="email" id="userEmail" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-4 focus:ring-blue-50 transition-all" placeholder="ইমেইল ঠিকানা">
                <input type="password" id="userPass" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-4 focus:ring-blue-50 transition-all" placeholder="পাসওয়ার্ড">
                <button type="submit" id="submitBtn" class="btn-active w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all text-lg">লগইন করুন</button>
            </form>

            <div class="text-center mt-6">
                <button onclick="toggleAuthMode()" id="switchBtn" class="text-blue-600 font-semibold text-sm hover:underline">অ্যাকাউন্ট নেই? নতুন খুলুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdbKGR6GALRaTmJFPgwfZAe_JiIcPnZ5U",
            authDomain: "enanprojct.firebaseapp.com",
            projectId: "enanprojct",
            storageBucket: "enanprojct.firebasestorage.app",
            messagingSenderId: "892424923254",
            appId: "1:892424923254:web:4b40a860059603ff8b1757"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;

        // মোড সুইচ (Login <-> Signup)
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('submitBtn').innerText = isLoginMode ? 'লগইন করুন' : 'অ্যাকাউন্ট খুলুন';
            document.getElementById('switchBtn').innerText = isLoginMode ? 'অ্যাকাউন্ট নেই? নতুন খুলুন' : 'অ্যাকাউন্ট আছে? লগইন করুন';
        };

        // লগইন বা সাইন-আপ লজিক
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            
            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("অ্যাকাউন্ট তৈরি সফল!");
                }
            } catch (err) { 
                alert("ভুল তথ্য অথবা ইমেইলটি আগে থেকেই ব্যবহৃত!"); 
                console.error(err);
            }
        };

        // গুগল লগইন
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (err) { 
                alert("গুগল লগইন ব্যর্থ হয়েছে!"); 
            }
        };

        // স্টেট মনিটর: লগইন সফল হলে সরাসরি home.html-এ নিয়ে যাবে
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "home.html";
            }
        });
    </script>
</body>
</html>
