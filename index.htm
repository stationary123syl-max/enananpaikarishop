<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইনান পাইকারি শপ - প্রিমিয়াম পোর্টাল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: #0f172a;
            overflow-x: hidden;
        }

        /* এনিমেটেড ব্যাকগ্রাউন্ড */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        /* কাস্টম স্ক্রলবার */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-animate"></div>

    <div class="glass-card w-full max-w-[480px] p-8 sm:p-12 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 height-48 bg-blue-600 rounded-full blur-[100px] opacity-20"></div>
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/10 rounded-3xl mb-6 border border-blue-500/20">
                <i class="fas fa-shopping-bag text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">ইনান পাইকারি শপ</h1>
            <p id="statusText" class="text-slate-400">আপনার ব্যবসা বৃদ্ধি করুন আমাদের সাথে</p>
        </div>

        <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 py-3.5 rounded-2xl hover:bg-white/10 transition-all font-bold text-white mb-8 shadow-sm">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-6" alt="Google">
            গুগল দিয়ে দ্রুত প্রবেশ
        </button>

        <div class="relative mb-8 text-center">
            <hr class="border-white/5">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#161f31] px-4 text-slate-500 text-[10px] font-bold uppercase tracking-[3px]">অথবা</span>
        </div>

        <form id="authForm" class="space-y-6">
            <div class="input-group">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider ml-1">ইমেইল ঠিকানা</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><i class="far fa-envelope"></i></span>
                    <input type="email" id="userEmail" required class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none" placeholder="name@company.com">
                </div>
            </div>

            <div class="input-group">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider ml-1">পাসওয়ার্ড</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><i class="fas fa-lock"></i></span>
                    <input type="password" id="userPass" required class="w-full pl-12 pr-12 py-4 rounded-2xl outline-none" placeholder="••••••••">
                    <button type="button" id="togglePass" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-blue-500 transition-colors">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-center py-2">
                <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-theme="dark"></div>
            </div>
            
            <button type="submit" id="submitBtn" class="btn-primary w-full text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">
                <span id="btnText">লগইন করুন</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </form>

        <div class="text-center mt-10">
            <p class="text-slate-500 text-sm">
                <span id="switchText">অ্যাকাউন্ট নেই?</span> 
                <button onclick="toggleAuthMode()" id="switchBtn" class="text-blue-500 font-bold hover:text-blue-400 ml-1 transition-colors">নতুন খুলুন</button>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার Firebase Config (আগেরটাই ঠিক আছে)
        const firebaseConfig = {
            apiKey: "AIzaSyAdbKGR6GALRaTmJFPgwfZAe_JiIcPnZ5U",
            authDomain: "enanprojct.firebaseapp.com",
            projectId: "enanprojct",
            storageBucket: "enanprojct.firebasestorage.app",
            messagingSenderId: "892424923254",
            appId: "1:892424923254:web:4b40a860059603ff8b1757"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let isLoginMode = true;

        // পাসওয়ার্ড টগল
        document.getElementById('togglePass').onclick = function() {
            const passInput = document.getElementById('userPass');
            const icon = this.querySelector('i');
            if(passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        // মোড সুইচিং
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('btnText').innerText = isLoginMode ? 'লগইন করুন' : 'অ্যাকাউন্ট তৈরি করুন';
            document.getElementById('switchBtn').innerText = isLoginMode ? 'নতুন খুলুন' : 'লগইন করুন';
            document.getElementById('statusText').innerText = isLoginMode ? 'আপনার ব্যবসা বৃদ্ধি করুন আমাদের সাথে' : 'ইনান শপে নতুন মার্চেন্ট হিসেবে যুক্ত হোন';
            document.getElementById('switchText').innerText = isLoginMode ? 'অ্যাকাউন্ট নেই?' : 'অ্যাকাউন্ট আছে?';
        };

        // ফর্ম সাবমিট
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // ক্যাপচা চেক (Demo validation)
            const response = grecaptcha.getResponse();
            if(response.length == 0) {
                alert("অনুগ্রহ করে 'আমি রোবট নই' বক্সে টিক দিন!");
                return;
            }

            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            btn.disabled = true;
            btn.style.opacity = '0.7';
            document.getElementById('btnText').innerText = 'প্রসেসিং হচ্ছে...';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("স্বাগতম! আপনার অ্যাকাউন্ট তৈরি হয়েছে।");
                }
            } catch (error) {
                alert("ভুল ইমেইল বা পাসওয়ার্ড! আবার চেষ্টা করুন।");
                btn.disabled = false;
                btn.style.opacity = '1';
                document.getElementById('btnText').innerText = isLoginMode ? 'লগইন করুন' : 'অ্যাকাউন্ট তৈরি করুন';
            }
        };

        // গুগল লগইন
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                alert("গুগল কানেকশন সমস্যা! আবার ট্রাই করুন।");
            }
        };

        // লগইন চেক
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "home.html";
        });
    </script>
</body>
</html>
