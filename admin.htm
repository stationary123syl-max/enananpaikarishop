<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ড্যাশবোর্ড | ইনান পাইকারি শপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
        .admin-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .input-style { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 15px; border-radius: 12px; outline: none; transition: all 0.3s; }
        .input-style:focus { border-color: #2563eb; background: white; ring: 2px; ring-color: #dbeafe; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white py-4 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fa fa-user-shield text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">অ্যাডমিন প্যানেল</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="home.html" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                    <i class="fa fa-eye"></i> শপ দেখুন
                </a>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 font-bold text-sm">লগআউট</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="admin-card p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i class="fa fa-plus-circle text-blue-600"></i> নতুন পণ্য যোগ করুন
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">পণ্যের নাম</label>
                            <input type="text" id="pName" class="input-style" placeholder="যেমন: Wireless Earbuds">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">মূল্য (৳)</label>
                            <input type="number" id="pPrice" class="input-style" placeholder="যেমন: ৫০০">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">ছাড়ের মূল্য (ঐচ্ছিক)</label>
                            <input type="number" id="pOldPrice" class="input-style" placeholder="যেমন: ৭০০">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">ছবির লিঙ্ক (URL)</label>
                            <input type="text" id="pImg" class="input-style" placeholder="https://image-url.com">
                        </div>
                        <button onclick="uploadProduct()" id="uploadBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 active:scale-95">
                            ডাটাবেসে সেভ করুন
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="admin-card p-6 min-h-[500px]">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-xl font-bold text-slate-800">মজুদকৃত পণ্যসমূহ</h2>
                        <span id="productCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">০টি পণ্য</span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-gray-400 text-xs uppercase border-b border-gray-100">
                                    <th class="pb-4 font-bold">ছবি</th>
                                    <th class="pb-4 font-bold">নাম ও মূল্য</th>
                                    <th class="pb-4 font-bold text-center">অ্যাকশন</th>
                                </tr>
                            </thead>
                            <tbody id="adminProductList" class="text-sm">
                                </tbody>
                        </table>
                    </div>
                    <div id="loader" class="flex justify-center py-20">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-4 py-10 text-center text-gray-400 text-xs">
        &copy; ২০২৬ <span class="text-blue-600 font-bold">Inan Wholesale Shop</span>. অ্যাডমিন কন্ট্রোল প্যানেল।
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdbKGR6GALRaTmJFPgwfZAe_JiIcPnZ5U",
            authDomain: "enanprojct.firebaseapp.com",
            projectId: "enanprojct",
            storageBucket: "enanprojct.firebasestorage.app",
            messagingSenderId: "892424923254",
            appId: "1:892424923254:web:4b40a860059603ff8b1757"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // অ্যাডমিন চেক (এখানে আপনি চাইলে নির্দিষ্ট ইমেইল দিয়ে ফিল্টার করতে পারেন)
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            }
        });

        // পণ্য আপলোড ফাংশন
        window.uploadProduct = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const oldPrice = document.getElementById('pOldPrice').value;
            const img = document.getElementById('pImg').value;
            const btn = document.getElementById('uploadBtn');

            if (!name || !price || !img) {
                alert("দয়া করে নাম, মূল্য এবং ছবির লিঙ্ক দিন!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";

            try {
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: price,
                    oldPrice: oldPrice || price,
                    img: img,
                    createdAt: new Date()
                });
                alert("পণ্যটি সফলভাবে যোগ করা হয়েছে!");
                // ফর্ম ক্লিয়ার করা
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pOldPrice').value = "";
                document.getElementById('pImg').value = "";
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ডাটাবেসে সেভ করুন";
            }
        };

        // পণ্য ডিলিট ফাংশন
        window.deleteProduct = async (productId) => {
            if (confirm("আপনি কি নিশ্চিতভাবে এই পণ্যটি ডিলিট করতে চান?")) {
                await deleteDoc(doc(db, "products", productId));
            }
        };

        // ডাটাবেস থেকে পণ্য দেখানো
        const listContainer = document.getElementById('adminProductList');
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            document.getElementById('loader').style.display = "none";
            listContainer.innerHTML = "";
            document.getElementById('productCount').innerText = snapshot.size + "টি পণ্য";

            snapshot.forEach((doc) => {
                const p = doc.data();
                listContainer.innerHTML += `
                    <tr class="border-b border-gray-50 group hover:bg-gray-50 transition">
                        <td class="py-4">
                            <img src="${p.img}" class="w-12 h-12 rounded-lg object-cover bg-gray-100">
                        </td>
                        <td class="py-4">
                            <p class="font-bold text-slate-700">${p.name}</p>
                            <p class="text-blue-600 text-xs font-bold">৳ ${p.price}</p>
                        </td>
                        <td class="py-4 text-center">
                            <button onclick="deleteProduct('${doc.id}')" class="text-red-400 hover:text-red-600 p-2 transition">
                                <i class="fa fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        });

        // লগআউট
        window.logout = () => signOut(auth);
    </script>

</body>
</html>
